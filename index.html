<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You...</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Profile -->
<div class="profile">
  <img src="profile_img.jpg">
</div>

<!-- Music -->
<button id="musicBtn"></button>
<audio id="bgMusic" src="music.mp3"></audio>

<!-- Hero Section -->
<section class="hero">
  <div class="overlay">
    <h1 id="introText"></h1>
  </div>
</section>

<!-- Gallery -->
<section class="gallery">
  <img src="IMAGE1.jpg">
  <img src="IMAGE2.jpg">
  <img src="IMAGE3.jpg">
  <img src="IMAGE4.jpg">
</section>

<!-- Message -->
<section class="message">
  <div class="box">
    <p id="typedText"></p>
  </div>
</section>

<!-- Secret -->
<button id="secretBtn">My little secret...</button>

<div id="modal">
  <div class="modalContent">
    <p>
      I still remember<br>
      our first conversation 
    </p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
