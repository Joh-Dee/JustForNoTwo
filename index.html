<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustForNoTwo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PROFILE -->
<img src="profile_img.jpg" class="profile">

<!-- MUSIC -->
<button id="musicBtn"></button>
<audio id="bgMusic" src="music.mp3"></audio>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h1 id="heroText"></h1>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery">
  <img src="IMAGE1.jpg">
  <img src="IMAGE2.jpg">
  <img src="IMAGE3.jpg">
  <img src="IMAGE4.jpg">
</section>

<!-- MESSAGE -->
<section class="message">
  <div class="letter-box">
    <p id="typedText"></p>
  </div>
</section>

<!-- SECRET -->
<button id="secretBtn">My little secret...</button>

<div id="modal">
  <div class="modalContent">
    <p>
      I still remember<br>
      our first conversation 
    </p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
